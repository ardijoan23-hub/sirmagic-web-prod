<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SirMagic — Kasir Ajaib Anda</title>
  <meta name="description" content="SirMagic — Kasir Ajaib untuk UMKM Indonesia. Segera hadir di App Store, Google Play, dan Web App.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #1F6F5F;
      --teal-dark: #0F4D41;
      --teal-light: #2A8A76;
      --cream: #FBFBF5;
      --gold: #F59E0B;
      --gold-light: #FDE68A;
      --text-primary: #0F2E27;
      --text-muted: #4A7A6E;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background-color: var(--teal);
      color: var(--cream);
      overflow-x: hidden;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.04) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(245,158,11,0.06) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(42,138,118,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    /* Logo */
    .logo-wrap {
      animation: fadeDown 0.8s ease both;
    }

    .logo-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.25));
    }

    /* Brand name */
    .brand {
      margin-top: 20px;
      animation: fadeDown 0.8s 0.1s ease both;
      text-align: center;
    }

    .brand-name {
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--cream);
      line-height: 1;
    }

    .brand-name .magic-star {
      color: var(--gold);
      font-size: 0.6em;
      vertical-align: super;
      margin-left: 2px;
      animation: twinkle 2s ease-in-out infinite;
    }

    .brand-tagline {
      font-size: clamp(0.85rem, 3vw, 1.05rem);
      font-weight: 400;
      color: rgba(251,251,245,0.65);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 32px auto;
      animation: fadeIn 0.8s 0.3s ease both;
    }

    /* Coming soon headline */
    .headline {
      animation: fadeUp 0.8s 0.35s ease both;
      text-align: center;
    }

    .coming-label {
      font-size: clamp(0.7rem, 2.5vw, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .headline-text {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 700;
      color: var(--cream);
      line-height: 1.35;
    }

    .headline-text span {
      color: var(--gold-light);
    }

    /* Platform cards */
    .platforms {
      display: flex;
      gap: 14px;
      margin-top: 36px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    .platform-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 20px;
      backdrop-filter: blur(10px);
      transition: background 0.2s, transform 0.2s, border-color 0.2s;
      cursor: default;
    }

    .platform-card:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(245,158,11,0.4);
      transform: translateY(-2px);
    }

    .platform-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .platform-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .platform-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(251,251,245,0.5);
      line-height: 1;
    }

    .platform-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.2;
    }

    /* Badge */
    .soon-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-top: 40px;
      animation: fadeUp 0.8s 0.65s ease both;
    }

    .soon-badge::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse-dot 1.6s ease-in-out infinite;
    }

    /* Footer domain */
    .footer-domain {
      margin-top: 40px;
      font-size: 0.8rem;
      color: rgba(251,251,245,0.3);
      letter-spacing: 0.1em;
      animation: fadeIn 1s 0.8s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    @media (max-width: 480px) {
      .platforms { gap: 10px; }
      .platform-card { padding: 10px 16px; }
    }
  </style>
</head>
